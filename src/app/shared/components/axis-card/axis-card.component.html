<article
  class="axis-card"
  [style.--axis-accent]="item().accent"
>
  <div class="axis-card__top">
    <span class="axis-card__index">Eje {{ item().index }}</span>
    <span class="axis-card__count">{{ item().topicCount }} frentes</span>
  </div>

  <div class="axis-card__body">
    <p class="axis-card__subtitle">{{ item().subtitle }}</p>
    <h3>{{ item().title }}</h3>
    <p class="axis-card__promise">{{ item().promise }}</p>
  </div>

  <a class="axis-card__link" [routerLink]="item().route">
    <strong>Ver servicio</strong>
  </a>
</article>
