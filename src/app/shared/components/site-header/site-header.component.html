<header class="site-header">
  <div class="site-shell">
    <a class="brand" routerLink="/">
      <img
        class="brand-logo"
        src="/report-visuals/Logo%20PRO3.jpg.jpeg"
        alt="PRO3 Project & Program Management Professionals"
      />
    </a>

    <div class="site-actions">
      <nav class="site-nav" aria-label="Navegación principal">
        <a
          class="site-nav__home"
          routerLink="/"
          routerLinkActive="is-active"
          [routerLinkActiveOptions]="{ exact: true }"
        >Inicio</a>

        @for (item of items(); track item.id) {
          <a [routerLink]="item.route" routerLinkActive="is-active">{{ item.title }}</a>
        }
      </nav>

      <a class="header-cta" [routerLink]="['/']" fragment="siguiente-paso">Hablemos</a>
    </div>
  </div>
</header>
