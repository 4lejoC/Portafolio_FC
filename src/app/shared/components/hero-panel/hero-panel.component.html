<section class="hero" id="inicio">
  <div class="hero-masthead">
    <p class="eyebrow">{{ kicker() }}</p>
  </div>

  <div class="hero-stage">
    <div class="hero-copy">
      <div class="hero-copy__body">
        <h1>{{ title() }}</h1>
        <p class="subtitle">{{ subtitle() }}</p>
        <p class="description">{{ description() }}</p>
      </div>

      <div class="hero-actions">
        <a class="button button-primary" [routerLink]="featurePath()">Explorar servicios</a>
        <a class="button button-secondary" href="#ejes">Ver los cinco ejes</a>
      </div>
    </div>

    <figure class="hero-visual">
      @if (visualSrc()) {
        <img [src]="visualSrc()" [alt]="visualAlt()" loading="eager" decoding="async" />
      }
    </figure>
  </div>

  <div class="hero-board" aria-label="Propuesta de valor">
    <p class="hero-board__label">Propuesta de valor</p>

    <div class="hero-facts" aria-label="Datos de valor">
      @for (metric of metrics(); track metric.label; let index = $index) {
        <article>
          <span class="hero-facts__index">0{{ index + 1 }}</span>
          <strong>{{ metric.value }}</strong>
          <p>{{ metric.label }}</p>
          <small>{{ metric.note }}</small>
        </article>
      }
    </div>
  </div>
</section>
