<app-site-header [items]="navigationItems()" />

<main class="axis-page-shell" [attr.data-chapter]="page().id">
  <section class="axis-page-hero">
    <div class="axis-page-hero__copy" [attr.data-index]="page().index">
      <div class="axis-page-hero__meta">
        <a class="back-link" routerLink="/">Volver al inicio</a>
        <span class="chapter-label">Eje {{ page().index }}</span>
      </div>

      <p class="eyebrow">{{ page().subtitle }}</p>
      <h1>{{ page().title }}</h1>
      <p class="pitch">{{ page().promise }}</p>
      <p class="lead">{{ page().description }}</p>

      <div class="axis-page-hero__actions">
        <!-- <a class="primary-link" [attr.href]="'#' + page().id">Ver entregables</a> -->
        <!--<a class="secondary-link" [routerLink]="['/']" fragment="siguiente-paso">{{ page().cta.label }}</a> -->
      </div>

      <div class="axis-page-hero__signals">
        @for (signal of page().trustPoints; track signal) {
          <span>{{ signal }}</span>
        }
      </div>
    </div>

    <figure class="axis-page-hero__visual">
      <img
        [src]="chapterVisualSrc()"
        [alt]="chapterVisualAlt()"
        loading="eager"
        decoding="async"
      />
    </figure>
  </section>

  <app-chapter-diagram [page]="page()" />

  <app-axis-section [page]="page()" />
</main>
